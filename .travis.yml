language: node_js

node_js:
  - '20'

addons:
  sonarcloud:
    organization: 'armonkahil'
    token:
      secure: 'REPLACE_WITH_ENCRYPTED_SONAR_TOKEN'

cache:
  npm: true

before_script:
  - sudo apt-get install -y openjdk-17-jdk
  - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
  - export PATH=$JAVA_HOME/bin:$PATH

install:
  - npm ci

script:
  - npm run test:coverage
  - sonar-scanner
