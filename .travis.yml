language: node_js

node_js:
  - '20'

addons:
  sonarcloud:
    organization: 'armonkahil'

cache:
  npm: true

before_script:
  - sudo mkdir -p /usr/share/man/man1
  - sudo apt-get install -y openjdk-17-jdk
  - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
  - export PATH=$JAVA_HOME/bin:$PATH

install:
  - npm ci

script:
  - npm run lint
  - npm run test:coverage
  - sonar-scanner
